name: Full Stack Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Monorepo Dependencies
      run: npm install
      working-directory: Part_7/Exercises/Blog_app

    - name: Install Frontend Dependencies
      run: npm install
      working-directory: Part_7/Exercises/Blog_app/frontend

    - name: Run Unit Tests
      run: npm run test
      working-directory: Part_7/Exercises/Blog_app
      env:
        NODE_ENV: test
        TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
        SECRET: ${{ secrets.SECRET }}

    - name: Install Playwright Dependencies
      run: npm install
      working-directory: Part_7/Exercises/Blog_app/E2E-Test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: Part_7/Exercises/Blog_app/E2E-Test

    - name: Run E2E Tests
      run: |
        # 1. Levantamos tu backend en modo test desde su carpeta en segundo plano
        cd ../backend && NODE_ENV=test TEST_MONGODB_URI="${{ secrets.TEST_MONGODB_URI }}" SECRET="${{ secrets.SECRET }}" npm run start:test &
        
        # 2. Levantamos tu frontend desde su carpeta en segundo plano
        cd ../frontend && npm run dev &
        
        # 3. Usamos una herramienta de GitHub para esperar de verdad a que el puerto del frontend responda
        npx wait-on http://127.0.0.1:5173 --timeout 60000
        
        # 4. Una vez que el puerto está vivo, corremos los tests en su carpeta original
        cd ../E2E-Test && npm run test
      working-directory: Part_7/Exercises/Blog_app/E2E-Test
      env:
        NODE_ENV: test
        TEST_MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
        SECRET: ${{ secrets.SECRET }}
