name: Full Stack Pipeline
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install Monorepo Dependencies
      run: npm install
      working-directory: Part_7/Exercices/Blog_app

    - name: Run Unit Tests
      run: npm run test
      working-directory: Part_7/Exercices/Blog_app
      env:
        MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
        SECRET: ${{ secrets.TEST_SECRET }}

    - name: Install Playwright Dependencies
      run: npm install
      working-directory: Part_7/Exercices/Blog_app/E2E-Test

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      working-directory: Part_7/Exercices/Blog_app/E2E-Test

    - name: Run E2E Tests
      run: npm run test
      working-directory: Part_7/Exercices/Blog_app/E2E-Test
      env:
        NODE_ENV: test
        MONGODB_URI: ${{ secrets.TEST_MONGODB_URI }}
        SECRET: ${{ secrets.TEST_SECRET }}
